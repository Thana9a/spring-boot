<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Club - Club Manager</title>
    <!-- Local Static Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="/css/bootstrap.min.css">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 5rem;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-section {
            padding: 4rem 0 2rem 0;
        }

        .form-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-label {
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            transition: all 0.2s ease-in-out;
        }

        .form-control:focus {
            background-color: rgba(15, 23, 42, 0.8);
            border-color: #6366f1;
            color: #ffffff;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        .form-control::placeholder {
            color: #475569;
        }

        .text-muted-custom {
            color: #94a3b8;
        }

        .btn-primary {
            background-color: #6366f1;
            border-color: #6366f1;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            transition: all 0.2s ease-in-out;
        }

        .btn-primary:hover {
            background-color: #4f46e5;
            border-color: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-outline-light {
            border-color: rgba(255, 255, 255, 0.2);
            color: #f8fafc;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            transition: all 0.2s ease-in-out;
        }

        .btn-outline-light:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent pt-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/clubs}">
                <span class="fs-4 me-2">⚽</span>
                <span>Club Manager</span>
            </a>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="mb-4 text-center">
                    <h1 class="fw-bold text-white">Edit Football Club</h1>
                    <p class="text-muted-custom">
                        Modify the details of this club and save the changes.
                    </p>
                </div>

                <div class="form-card">
                    <form method="post" th:action="@{/clubs/{clubId}/edit(clubId=${club.id})}" th:object="${club}">
                        <!-- Hidden ID Field -->
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="title" class="form-label">Club Title</label>
                            <input type="text" id="title" class="form-control" placeholder="Example: Arsenal FC"
                                th:field="*{title}" required>
                        </div>

                        <div th:if="${#fields.hasErrors('title')}" class="alert alert-danger">
                            <span th:errors="*{title}"></span>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Club Email</label>
                            <input type="email" id="email" class="form-control" placeholder="Example: contact@club.com"
                                th:field="*{email}" required>
                        </div>

                        <div th:if="${#fields.hasErrors('email')}" class="alert alert-danger">
                            <span th:errors="*{email}"></span>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label">Description</label>
                            <textarea id="description" class="form-control" rows="5"
                                placeholder="Write a short description about the club..." th:field="*{description}"
                                required></textarea>
                        </div>
                        <div th:if="${#fields.hasErrors('description')}" class="alert alert-danger">
                            <span th:errors="*{description}"></span>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                Update Club
                            </button>

                            <a th:href="@{/clubs}" class="btn btn-outline-light">
                                Cancel
                            </a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </main>

    <!-- Local Static Bootstrap Bundle JS -->
    <script th:src="@{/js/bootstrap.bundle.min.js}" src="/js/bootstrap.bundle.min.js"></script>
</body>

</html>
